services:
  - type: web
    name: app-tracker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: app-tracker-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: app-tracker-db
    plan: free
    databaseName: app_tracker
